<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Admin - Quote Requests | Vinayagam CCTV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-camera-video-fill me-2"></i>Vinayagam <span>CCTV</span> — Admin
        </a>
        <a th:href="@{/}" class="btn-outline-green py-2 px-3">← Back to Site</a>
    </div>
</nav>

<div class="container py-5">
    <h3 class="mb-4"><i class="bi bi-inbox-fill me-2 text-success"></i>Quote Requests</h3>

    <div th:if="${quotes.empty}" class="text-center py-5 text-muted">
        <i class="bi bi-inbox fs-1"></i>
        <p class="mt-3">No quote requests yet.</p>
    </div>

    <div class="table-responsive" th:if="${!quotes.empty}">
        <table class="table table-hover bg-white rounded shadow-sm">
            <thead class="bg-dark text-white">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Service</th>
                    <th>Message</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="q, stat : ${quotes}">
                    <td th:text="${stat.count}"></td>
                    <td th:text="${q.name}"></td>
                    <td><a th:href="'tel:' + ${q.phone}" th:text="${q.phone}"></a></td>
                    <td><a th:href="'mailto:' + ${q.email}" th:text="${q.email}"></a></td>
                    <td>
                        <span class="badge bg-success" th:text="${q.service}"></span>
                    </td>
                    <td th:text="${q.message}"></td>
                    <td th:text="${#temporals.format(q.createdAt, 'dd MMM yyyy HH:mm')}"></td>
                </tr>
            </tbody>
        </table>
        <p class="text-muted mt-2">Total: <strong th:text="${quotes.size()}"></strong> requests</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
