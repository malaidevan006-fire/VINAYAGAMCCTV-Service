# Server
spring.main.web-application-type=servlet
#server.port=8080

# App Name
spring.application.name=Vinayagam CCTV

# Datasource (default: MySQL vinayagam_CCTV). Use env vars to override.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/vinagayam_cctv?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:2003}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA (MySQL)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (kept disabled by default when using MySQL)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false

# =============================================
# TO USE MySQL INSTEAD:
# Comment out H2 section above and uncomment:
# =============================================
# spring.datasource.url=jdbc:mysql://localhost:3306/vinayagam_cctv
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
