<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Customer Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <i class="bi bi-person-circle fs-1 text-success"></i>
                        <div>
                            <h3 class="mb-0">Customer Profile</h3>
                            <p class="text-muted mb-0">Your signed-in account</p>
                        </div>
                    </div>

                    <div class="list-group mb-4">
                        <div class="list-group-item">
                            <small class="text-muted d-block">Name</small>
                            <strong th:text="${customerName}">Customer Name</strong>
                        </div>
                        <div class="list-group-item">
                            <small class="text-muted d-block">Email</small>
                            <strong th:text="${customerEmail}">customer@example.com</strong>
                        </div>
                    </div>

                    <div class="d-flex gap-2 flex-wrap">
                        <a th:href="@{/}" class="btn btn-success">
                            <i class="bi bi-house-fill me-1"></i>Home
                        </a>
                        <a th:href="@{/logout}" class="btn btn-outline-secondary">
                            <i class="bi bi-box-arrow-right me-1"></i>Logout
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
