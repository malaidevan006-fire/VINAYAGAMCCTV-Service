<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Customer Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="mb-3">Create Customer Account</h3>
                    <p class="text-muted">Register to save your CCTV enquiries and get faster support.</p>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                    <form th:action="@{/signup}" th:object="${customerAccount}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input id="fullName" type="text" class="form-control" th:field="*{fullName}" title="Full name" placeholder="Enter your full name" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input id="email" type="email" class="form-control" th:field="*{email}" title="Email address" placeholder="Enter your email" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input id="phone" type="tel" class="form-control" th:field="*{phone}" title="Phone number" placeholder="Enter your phone number" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input id="password" type="password" class="form-control" th:field="*{password}" title="Password" placeholder="Enter a secure password" required/>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Sign Up</button>
                    </form>
                    <div class="mt-3 text-center">
                        <a th:href="@{/signin}">Already have an account? Sign In</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
